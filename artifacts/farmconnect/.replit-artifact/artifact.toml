kind = "web"
previewPath = "/"
title = "FarmConnect AI"
version = "1.0.0"
id = "artifacts/farmconnect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23453

[services.development]
run = "pnpm --filter @workspace/farmconnect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/farmconnect", "run", "build" ]
publicDir = "artifacts/farmconnect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23453"
BASE_PATH = "/"
